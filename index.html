<div align="center">
  <svg width="600" height="200" style="background-color: #000000; border-radius: 10px;">
    <!-- The Text -->
    <text 
      x="50%" 
      y="50%" 
      dominant-baseline="middle" 
      text-anchor="middle" 
      fill="white" 
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
      font-size="35" 
      font-weight="bold"
    >
      Testing out basic html code/animation
      <!-- The Animation: Fades from 0 (invisible) to 1 (visible) -->
      <animate 
        attributeName="opacity" 
        from="0" 
        to="1" 
        dur="3s" 
        begin="0s" 
        fill="freeze" 
      />
    </text>
  </svg>
</div>
